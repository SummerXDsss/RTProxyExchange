name: Build & Deploy

# Builds a linux/amd64 image, publishes it to GHCR, then deploys to the server
# over SSH (docker compose pull + up). Triggered on version tags (v*) or
# manually via the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Gate so the deploy job is skipped (not failed) when server secrets are
  # absent. Secrets can't be used directly in `if:`, so surface presence via a
  # job output first.
  check-secrets:
    name: Check deploy secrets
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST secret not set — skipping server deploy. Image was still pushed to GHCR."
          fi

  deploy:
    name: Deploy to server
    needs: check-secrets
    runs-on: ubuntu-latest
    # Only deploy from the canonical repo and only when secrets are configured.
    if: github.repository_owner == 'SummerXDsss' && needs.check-secrets.outputs.configured == 'true'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd /root/codex-deploy
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Point the compose stack at the freshly published image.
            export CODEX_IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker compose -f docker-compose.proxy.yml pull codex-converter
            docker compose -f docker-compose.proxy.yml up -d
            docker image prune -f
            sleep 3
            curl -fsS http://localhost:8787/api/health || (docker logs --tail 50 codex-converter && exit 1)
            echo "deploy ok"
