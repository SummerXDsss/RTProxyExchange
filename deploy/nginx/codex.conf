# Reverse proxy for the Codex Token converter.
# Terminates TLS (self-signed cert) and forwards to the app container over the
# internal Docker network. The app no longer needs a public port.

# Redirect all plain HTTP to HTTPS.
# Note: HTTPS is published on host port 8443 (443 is used by another service),
# so the redirect target includes the explicit port.
server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Batch token input can be sizable.
    client_max_body_size 25m;

    # SSE streaming endpoint: disable buffering so progress events flush live.
    location /api/convert/stream {
        proxy_pass              http://codex-converter:8787;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection '';
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass         http://codex-converter:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
